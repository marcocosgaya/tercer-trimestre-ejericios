<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Usuario</title>
</head>
<body>

<h1>Nuevo Usuario</h1>


<form id="form-usuario">

        <label>
            id_Usuario:
            <input type="text" id="id_usuario" required>
        </label>
        <br><br>

        <label>
        Usuario:
        <input type="text" id="usuario" required>
    </label>
    <br><br>

    <label>
        Password:
        <input type="password" id="password" required>
    </label>
    <br><br>

    <label>
        Fecha_creacion:
        <input type="text" id="fecha_creacion" required>
    </label>
    <br><br>


    <label>
        Ultimo_login:
        <input type="text" id="ultimo_login" required>
    </label>
    <br><br>

    <button type="submit">Guardar</button>
</form>

<br>
<a href="usuario.html">Volver al listado</a>

<script src="nuevoUsuario.js"></script>
</body>
</html>
